name: Incubated project health check

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run health check
        run: |
          python scripts/check-incubated-projects.py --output health-check-report.md || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: incubated-project-health-check-report
          path: health-check-report.md

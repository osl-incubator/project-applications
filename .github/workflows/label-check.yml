name: Label check

on:
  workflow_dispatch:

permissions:
  issues: read

jobs:
  label-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check label script syntax
        run: bash -n scripts/create-labels.sh
      - name: List labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label list --repo "${{ github.repository }}"
